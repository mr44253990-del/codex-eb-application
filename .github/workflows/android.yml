name: Android CI

on:
push:
branches:
- ""
pull_request:
branches:
- ""
workflow_dispatch:

jobs:
build:
name: Build EB Chat APK
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: "17"
      cache: gradle

  - name: Set up Android SDK
    uses: android-actions/setup-android@v3

  - name: Install Android Platform and Build Tools
    run: |
      sdkmanager "platforms;android-35" "build-tools;35.0.0"

  - name: Restore google-services.json
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
    run: |
      mkdir -p app

      if [ -n "$GOOGLE_SERVICES_JSON" ]; then
        printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
      elif [ -f app/google-services.example.json ]; then
        cp app/google-services.example.json app/google-services.json
      else
        echo "{}" > app/google-services.json
      fi

  - name: Restore Release Keystore
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    run: |
      if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
        printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
        echo "Keystore restored."
      else
        echo "No keystore secret found."
      fi

  - name: Grant Gradle Permission
    run: chmod +x gradlew

  - name: Build Debug APK
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    run: ./gradlew assembleDebug

  - name: Build Release APK
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    run: |
      if [ -f release.keystore ]; then
        ./gradlew assembleRelease
      else
        echo "Keystore not found. Skipping release build."
      fi

  - name: Upload APK Artifacts
    uses: actions/upload-artifact@v4
    with:
      name: eb-chat-apks
      path: |
        app/build/outputs/apk/debug/*.apk
        app/build/outputs/apk/release/*.apk
      if-no-files-found: warn
